<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ultimate Box Designer V8 Final</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;overflow:hidden;background:#050505;color:#fff;font-family:Inter,Arial,sans-serif;display:grid;grid-template-columns:400px 1fr 420px}
.left,.right{background:#0b0b0b;padding:14px;overflow:auto}
.left{border-right:1px solid #222}.right{border-left:1px solid #222}
.preview{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#181818,#020202)}
.card{background:#111;border:1px solid #222;border-radius:14px;padding:12px;margin-bottom:12px}
label{display:flex;justify-content:space-between;font-size:12px;color:#ccc;margin:6px 0}
input,select,textarea,button{width:100%}
textarea{height:250px;background:#050505;color:#89ff9f;border:1px solid #222;border-radius:10px;padding:10px}
button{padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white}
#borderLayer{position:relative;padding:4px;border-radius:32px}
#bgLayer{position:relative;overflow:hidden}
#glass{position:absolute;inset:0;z-index:2}
#noise{position:absolute;inset:0;z-index:3;pointer-events:none}
#glow1{position:absolute;border-radius:999px;filter:blur(80px);z-index:0}
</style>
</head>
<body>
<div class="left">
<h2>Box Designer</h2>

<div class="card">
<label>Width <span id="wv"></span></label><input id="w" type="range" min="100" max="900" value="350">
<label>Height <span id="hv"></span></label><input id="h" type="range" min="100" max="700" value="220">
<label>Radius <span id="rv"></span></label><input id="r" type="range" min="0" max="120" value="30">
</div>

<div class="card">
<b>Background</b>
<label>Type</label>
<select id="bgType"><option>linear</option><option>radial</option><option>conic</option><option>solid</option></select>
<label>Direction</label>
<select id="bgDir">
<option value="to right">Leftâ†’Right</option>
<option value="to left">Rightâ†’Left</option>
<option value="to bottom">Topâ†’Bottom</option>
<option value="to top">Bottomâ†’Top</option>
</select>
<label>Angle <span id="angv"></span></label><input id="angle" type="range" min="0" max="360" value="135">
<label>Opacity <span id="bgov"></span></label><input id="bgOpacity" type="range" min="0" max="100" value="100">
<label>Color 1</label><input id="c1" type="color" value="#8b5cf6">
<label>Color 2</label><input id="c2" type="color" value="#06b6d4">
</div>

<div class="card">
<b>Border</b>
<label>Size <span id="bsv"></span></label><input id="bs" type="range" min="0" max="20" value="4">
<label>Opacity <span id="bopv"></span></label><input id="borderOpacity" type="range" min="0" max="100" value="100">
<label>Direction</label>
<select id="borderDir">
<option value="to right">Leftâ†’Right</option>
<option value="to left">Rightâ†’Left</option>
<option value="to bottom">Topâ†’Bottom</option>
<option value="to top">Bottomâ†’Top</option>
</select>
<label>Border 1</label><input id="bc1" type="color" value="#ff00ff">
<label>Border 2</label><input id="bc2" type="color" value="#00ffff">
</div>

<div class="card">
<b>Glass</b>
<label>Glass Opacity <span id="opv"></span></label><input id="op" type="range" min="0" max="100" value="15">
<label>Blur <span id="blv"></span></label><input id="blur" type="range" min="0" max="60" value="20">
<label>Brightness <span id="brv"></span></label><input id="bright" type="range" min="50" max="200" value="120">
</div>

<div class="card">
<b>Glow</b>
<label>Size <span id="gsv"></span></label><input id="gs" type="range" min="50" max="500" value="220">
<label>X <span id="gxv"></span></label><input id="gx" type="range" min="-300" max="300" value="0">
<label>Y <span id="gyv"></span></label><input id="gy" type="range" min="-300" max="300" value="0">
<label>Color</label><input id="gc" type="color" value="#00ffff">
</div>

<div class="card">
<b>Noise</b>
<label>Intensity <span id="niv"></span></label><input id="noiseIntensity" type="range" min="0" max="30" value="8">
</div>
</div>

<div class="preview">
<div id="borderLayer">
<div id="glow1"></div>
<div id="bgLayer">
<div id="glass"></div>
<div id="noise"></div>
</div>
</div>
</div>

<div class="right">
<h3>CSS Export</h3>
<textarea id="css"></textarea>
<h3>Tailwind Export</h3>
<textarea id="tw"></textarea>
<button onclick="navigator.clipboard.writeText(css.value)">Copy CSS</button>
</div>

<script>
const ids=['w','h','r','bgType','bgDir','angle','bgOpacity','c1','c2','bs','borderOpacity','borderDir','bc1','bc2','op','blur','bright','gs','gx','gy','gc','noiseIntensity'];
ids.forEach(id=>document.getElementById(id).oninput=update);

function hexToRgba(hex,a){
const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return `rgba(${r},${g},${b},${a})`;
}

function update(){
wv.textContent=w.value+'px'; hv.textContent=h.value+'px'; rv.textContent=r.value+'px';
angv.textContent=angle.value+'Â°'; bgov.textContent=bgOpacity.value+'%';
bsv.textContent=bs.value+'px'; bopv.textContent=borderOpacity.value+'%';
opv.textContent=op.value+'%'; blv.textContent=blur.value+'px'; brv.textContent=bright.value+'%';
gsv.textContent=gs.value+'px'; gxv.textContent=gx.value+'px'; gyv.textContent=gy.value+'px';
niv.textContent=noiseIntensity.value+'%';

let bg='';
const a=bgOpacity.value/100;
if(bgType.value==='solid') bg=hexToRgba(c1.value,a);
if(bgType.value==='linear') bg=`linear-gradient(${bgDir.value},${hexToRgba(c1.value,a)},${hexToRgba(c2.value,a)})`;
if(bgType.value==='radial') bg=`radial-gradient(circle,${hexToRgba(c1.value,a)},${hexToRgba(c2.value,a)})`;
if(bgType.value==='conic') bg=`conic-gradient(from ${angle.value}deg,${hexToRgba(c1.value,a)},${hexToRgba(c2.value,a)})`;

const ba=borderOpacity.value/100;
borderLayer.style.padding=bs.value+'px';
borderLayer.style.borderRadius=r.value+'px';
borderLayer.style.background=`linear-gradient(${borderDir.value},${hexToRgba(bc1.value,ba)},${hexToRgba(bc2.value,ba)})`;

bgLayer.style.width=w.value+'px';
bgLayer.style.height=h.value+'px';
bgLayer.style.borderRadius=(r.value-2)+'px';
bgLayer.style.background=bg;

glass.style.background=`rgba(255,255,255,${op.value/100})`;
glass.style.backdropFilter=`blur(${blur.value}px) brightness(${bright.value}%)`;
glass.style.webkitBackdropFilter=`blur(${blur.value}px) brightness(${bright.value}%)`;

noise.style.opacity=noiseIntensity.value/100;
noise.style.backgroundImage='radial-gradient(#fff 1px,transparent 1px)';
noise.style.backgroundSize='10px 10px';

glow1.style.width=gs.value+'px';
glow1.style.height=gs.value+'px';
glow1.style.background=gc.value;
glow1.style.left=`calc(50% + ${gx.value}px)`;
glow1.style.top=`calc(50% + ${gy.value}px)`;
glow1.style.transform='translate(-50%,-50%)';

css.value=`width:${w.value}px;
height:${h.value}px;
border-radius:${r.value}px;
background:${bg};
border:${bs.value}px solid transparent;
backdrop-filter:blur(${blur.value}px) brightness(${bright.value}%);
box-shadow:0 0 ${gs.value/2}px ${gc.value};`;

tw.value=`w-[${w.value}px]
h-[${h.value}px]
rounded-[${r.value}px]
backdrop-blur-[${blur.value}px]
opacity-[${bgOpacity.value}%]`;
}
update();
</script>
</body>
</html>
